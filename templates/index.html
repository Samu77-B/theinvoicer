<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice app</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Invoices</span>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#newClientModal">
          <i class="fas fa-user-plus me-1"></i>New client
        </button>
        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newInvoiceModal">
          <i class="fas fa-file-invoice me-1"></i>New invoice
        </button>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    <div id="invoicesList" class="list-group shadow-sm"></div>
  </div>

  <!-- New client -->
  <div class="modal fade" id="newClientModal" tabindex="-1" aria-labelledby="newClientModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="newClientModalLabel">New client</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="clientForm">
            <div class="mb-3">
              <label class="form-label" for="clientName">Name</label>
              <input type="text" class="form-control" id="clientName" name="name" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="clientEmail">Email</label>
              <input type="email" class="form-control" id="clientEmail" name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="clientAddress">Address</label>
              <textarea class="form-control" id="clientAddress" name="address" rows="2" placeholder="Street, city, postcode"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveClient()">Save client</button>
        </div>
      </div>
    </div>
  </div>

  <!-- New invoice -->
  <div class="modal fade" id="newInvoiceModal" tabindex="-1" aria-labelledby="newInvoiceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="newInvoiceModalLabel">New invoice</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="invoiceForm">
            <div class="mb-3">
              <label class="form-label">Client</label>
              <select class="form-select" name="client_id" required>
                <option value="">Select a client…</option>
              </select>
            </div>
            <label class="form-label">Line items</label>
            <div id="invoiceItems"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="addInvoiceItem()">
              <i class="fas fa-plus me-1"></i>Add line
            </button>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveInvoice()">Create invoice</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Invoice preview -->
  <div class="modal fade" id="invoicePreviewModal" tabindex="-1" aria-labelledby="invoicePreviewModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="invoicePreviewModalLabel">Invoice preview</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="invoicePreview" class="invoice-preview"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" onclick="sendInvoiceEmail()" id="btnSendInvoice">
            <i class="fas fa-paper-plane me-1"></i>Send to client
          </button>
          <button type="button" class="btn btn-outline-primary" onclick="printInvoice()">
            <i class="fas fa-print me-1"></i>Print
          </button>
          <button type="button" class="btn btn-primary" onclick="savePDF()">
            <i class="fas fa-file-pdf me-1"></i>Save as PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit invoice -->
  <div class="modal fade" id="editInvoiceModal" tabindex="-1" aria-labelledby="editInvoiceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editInvoiceModalLabel">Edit invoice</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editInvoiceForm">
            <input type="hidden" name="invoice_id">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Invoice #</label>
                <input type="text" class="form-control" name="invoice_number" readonly>
              </div>
              <div class="col-md-6">
                <label class="form-label">Client</label>
                <input type="text" class="form-control" name="client_name" readonly>
              </div>
            </div>
            <div id="editInvoiceItems"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="addEditInvoiceItem()">
              <i class="fas fa-plus me-1"></i>Add line
            </button>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="updateInvoice()">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
